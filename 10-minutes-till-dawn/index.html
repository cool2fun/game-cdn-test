<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>10 Minutes Till Dawn</title>
    <script src="Build/UnityLoader.js"></script>
    <link rel="icon" href="icon.png">
    <script>
      // CDN base for this game's Build folder (split parts live here).
      // Overridable via window.CDN_BASE so the same file works on GitHub Pages,
      // jsDelivr, or embedded inside a Google Apps Script iframe.
      var CDN_BASE =
        window.CDN_BASE ||
        "https://cdn.jsdelivr.net/gh/cool2fun/game-cdn-test@master/10-minutes-till-dawn/Build/";

      // Fetch a multi-part asset and stitch it back into one Blob URL.
      async function assembleParts(parts) {
        var buffers = await Promise.all(
          parts.map(function (p) {
            return fetch(CDN_BASE + p).then(function (r) {
              if (!r.ok) throw new Error("part " + p + " -> HTTP " + r.status);
              return r.arrayBuffer();
            });
          })
        );
        return URL.createObjectURL(new Blob(buffers, { type: "application/octet-stream" }));
      }

      async function bootGame() {
        // parts-manifest.json maps each oversized asset to its ordered parts.
        var manifest = await fetch(CDN_BASE + "parts-manifest.json").then(function (r) {
          return r.json();
        });
        var config = await fetch(CDN_BASE + "10MinutesTillDawnWebGL.json").then(function (r) {
          return r.json();
        });

        // Reassemble each split asset and repoint the config at the Blob URL.
        // Assets not in the manifest (e.g. wasm.framework) stay on the CDN directly.
        var fieldByFile = {
          "10MinutesTillDawnWebGL.data.unityweb": "dataUrl",
          "10MinutesTillDawnWebGL.wasm.code.unityweb": "wasmCodeUrl",
        };
        for (var file in manifest) {
          var blobUrl = await assembleParts(manifest[file]);
          config[fieldByFile[file]] = blobUrl;
        }
        // Non-split asset: point at absolute CDN URL so resolveBuildUrl keeps it as-is.
        config.wasmFrameworkUrl = CDN_BASE + config.wasmFrameworkUrl;

        // Hand the patched config straight to UnityLoader via a data: URL,
        // so instantiate's XHR reads our rewritten JSON instead of the CDN one.
        var configUrl =
          "data:application/json," + encodeURIComponent(JSON.stringify(config));
        window.gameInstance = UnityLoader.instantiate("gameContainer", configUrl);
      }

      var gameInstance;
      bootGame().catch(function (err) {
        document.getElementById("gameContainer").innerHTML =
          '<pre style="color:#fff;padding:16px;font:14px monospace">Load error: ' +
          (err && err.message ? err.message : err) +
          "</pre>";
      });

      var scaleToFit;
      try {
        scaleToFit = !!JSON.parse("");
      } catch (e) {
        scaleToFit = true;
      }

      function onResize() {
        var canvas = gameInstance.Module.canvas;
        var container = gameInstance.container;
        var w;
        var h;

        if (scaleToFit) {
          w = window.innerWidth;
          h = window.innerHeight;

          var r = 675 / 1200;

          if (w * r > window.innerHeight) {
            w = Math.min(w, Math.ceil(h / r));
          }
          h = Math.floor(w * r);
        } else {
          w = 1200;
          h = 675;
        }

        container.style.width = canvas.style.width = w + "px";
        container.style.height = canvas.style.height = h + "px";
        container.style.top = Math.floor((window.innerHeight - h) / 2) + "px";
        container.style.left = Math.floor((window.innerWidth - w) / 2) + "px";
      }
      window.addEventListener("resize", onResize);
    </script>
    <style>
      html,
      body {
        background: #000;
        background: ;
        width: 100%;
        height: 100%;
        overflow: visible;
        padding: 0;
        margin: 0;
      }

      div#gameContainer {
        background: transparent !important;
        position: absolute;
      }

      div#gameContainer canvas {
        position: absolute;
      }

      div#gameContainer[data-pixelated="true"] canvas {
        image-rendering: optimizeSpeed;
        image-rendering: -webkit-crisp-edges;
        image-rendering: -moz-crisp-edges;
        image-rendering: -o-crisp-edges;
        image-rendering: crisp-edges;
        image-rendering: -webkit-optimize-contrast;
        image-rendering: optimize-contrast;
        image-rendering: pixelated;
        -ms-interpolation-mode: nearest-neighbor;
      }
    </style>
  </head>

  <body onload="onResize();">
    <div id="gameContainer" data-pixelated="true"></div>
  </body>
</html>
