<!DOCTYPE html>
<html lang="en-us">

<head>
<base href="./"/>
<meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no"/>
	<meta charset="utf-8">
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
	<title>CS Dust</title>
	<link rel="stylesheet" href="main_style.css">
<script src="vendor/prevent-keys.js"></script>

</head>

<body>
	<div id="gameContainer">
		<canvas id="unity-canvas" data-pixel-art=""></canvas>
		  <div id="unity-loading-bar">
          <div id="unity-logo"></div>
          <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
          </div>

		<script>
			// Y8 SDK stubs — game calls showNextAd() and showReward() from Unity externs
			window.showNextAd = function() { console.log('[stub] showNextAd called'); };
			window.showReward  = function() { console.log('[stub] showReward called'); };
			// ID.NET SDK stub — _Init() calls ID.GameAPI.init() and ID.Event.subscribe()
			window.ID = window.ID || {
				Event: {
					subscribe: function() {},
					clear: function() {}
				},
				ads: {
					init: function() { console.log('[stub] ID.ads.init called'); }
				},
				GameAPI: {
					init: function(appId, opts, cb) {
						if (cb) cb({}, {});
						SendMessage("Y8_Root", "CallbackReady");
					}
				},
				SilentLogin: {
					autoLogin: function() {}
				}
			};
			// Y8 idAsyncInit callback (triggered by ID.NET SDK)
			window.idAsyncInit = window.idAsyncInit || function() {
				SendMessage("Y8_Root", "CallbackReady");
			};
		</script>
		<script src="Build/CSDust.loader.js"></script>
		<script>
			var loadingBar = document.querySelector("#unity-loading-bar");
			var progressBarFull = document.querySelector("#unity-progress-bar-full");
			var canvas = document.querySelector("#unity-canvas");
			var logo = document.querySelector("#unity-logo");
			var CDN_BASE = window.CDN_BASE || "Build/";
			async function assembleBlobUrl(parts, type) {
				var buffers = await Promise.all(parts.map(function (p) {
					return fetch(CDN_BASE + p).then(function (r) {
						if (!r.ok) throw new Error("part " + p + " -> HTTP " + r.status);
						return r.arrayBuffer();
					});
				}));
				return URL.createObjectURL(new Blob(buffers, { type: type }));
			}
			var config = {
				dataUrl: "Build/webgl.data",
				frameworkUrl: "Build/build.framework.js",
				codeUrl: "Build/build.wasm",
				streamingAssetsUrl: "StreamingAssets",
				companyName: "SAFING Inc",
				productName: "CS Dust",
				productVersion: "1",
			};
			var scaleToFit;
			try {
				scaleToFit = !!JSON.parse("");
			} catch (e) {
				scaleToFit = true;
			}
			function progressHandler(progress) {
				var percent = progress * 100 + '%';
				progressBarFull.style.width = percent;
			}
			function onResize() {
				var container = canvas.parentElement;
				var w;
				var h;

				if (scaleToFit) {
					w = window.innerWidth;
					h = window.innerHeight;

					var r = 600 / 960;

					if (w * r > window.innerHeight) {
						w = Math.min(w, Math.ceil(h / r));
					}
					h = Math.floor(w * r);
				} else {
					w = 960;
					h = 600;
				}

				container.style.width = canvas.style.width = w + "px";
				container.style.height = canvas.style.height = h + "px";
				container.style.top = Math.floor((window.innerHeight - h) / 2) + "px";
				container.style.left = Math.floor((window.innerWidth - w) / 2) + "px";
				logo.style.left = Math.floor((w - 154) / 2) + "px"; // 154 is the width of the logo
				logo.style.top = Math.floor((h - 130) / 3) + "px";  // 130 is the height of the logo, divided by 3 for 33
			}
			var myGameInstance = null;
			async function boot() {
				var manifest = await fetch(CDN_BASE + "parts-manifest.json").then(function (r) { return r.json(); });
				// Reassemble split assets into blob: URLs (loader fetches these directly).
				config.dataUrl = await assembleBlobUrl(manifest["webgl.data"], "application/octet-stream");
				config.codeUrl = await assembleBlobUrl(manifest["build.wasm"], "application/wasm");
				// Non-split asset: keep on CDN.
				config.frameworkUrl = CDN_BASE + "build.framework.js";
				var instance = await createUnityInstance(canvas, config, progressHandler);
				loadingBar.style.display = 'none';
				myGameInstance = instance;
				canvas = instance.Module.canvas;
				onResize();
			}
			boot().catch(function (e) { alert("Load error: " + (e && e.message ? e.message : e)); });
			window.addEventListener('resize', onResize);
			onResize();

			if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
				// Mobile device style: fill the whole browser client area with the game canvas:
				const meta = document.createElement('meta');
				meta.name = 'viewport';
				meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
				document.getElementsByTagName('head')[0].appendChild(meta);
			}
		</script>
		
	</div>
</body>

</html>
